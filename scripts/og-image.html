<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1200" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #15130f;
    font-family: 'Geist', system-ui, sans-serif;
    color: #ece5d3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 64px 80px;
  }

  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .wordmark {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -3px;
    color: #ece5d3;
    line-height: 1;
  }

  .wordmark .loops {
    display: inline-flex;
    gap: 0;
    position: relative;
  }

  .badge {
    background: #c46a44;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    align-self: flex-start;
    margin-top: 10px;
  }

  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 0 16px;
  }

  .tagline {
    font-size: 52px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -1.5px;
    color: #ece5d3;
    max-width: 820px;
  }

  .tagline em {
    color: #c46a44;
    font-style: normal;
  }

  .sub {
    margin-top: 20px;
    font-size: 22px;
    font-weight: 400;
    color: #b8af9d;
    letter-spacing: -0.3px;
  }

  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .audience {
    display: flex;
    gap: 20px;
  }

  .pill {
    background: #221e17;
    border: 1.5px solid #2e2a22;
    color: #b8af9d;
    font-size: 16px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 100px;
    letter-spacing: 0.01em;
  }

  .domain {
    font-size: 18px;
    font-weight: 400;
    color: #57503f;
    letter-spacing: 0.01em;
  }

  /* Decorative grid lines */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="top">
    <div class="wordmark">loopr</div>
    <div class="badge">Free &amp; Open Source</div>
  </div>

  <div class="middle">
    <div class="tagline">Repeat any loop into a <em>longer ride.</em></div>
    <div class="sub">Drop a GPX circuit · set laps or distance · download for Garmin, Wahoo, or Strava</div>
  </div>

  <div class="bottom">
    <div class="audience">
      <span class="pill">Cyclists</span>
      <span class="pill">Triathletes</span>
      <span class="pill">Race Organizers</span>
      <span class="pill">Endurance Athletes</span>
    </div>
    <div class="domain">loopr.willcsoftware.com</div>
  </div>
</body>
</html>
