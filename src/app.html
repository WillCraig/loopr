<!doctype html>
<html lang="en" data-theme="clay" data-density="regular" data-radius="soft">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Free GPX loop repeater for cyclists, triathlon bike legs, and crit race courses. Drop a GPX of one circuit, set laps or a distance target, download a stitched GPX for Garmin, Wahoo, or Strava. Runs in your browser."
		/>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "loopr",
				"url": "https://loopr.willcsoftware.com",
				"applicationCategory": "SportApplication",
				"operatingSystem": "Any",
				"offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
				"description": "Free GPX loop repeater for cyclists, triathletes, and crit race organizers.",
				"featureList": [
					"GPX loop and lap repeater",
					"Criterium race course builder",
					"Triathlon bike leg route planner",
					"Endurance athlete GPX tool",
					"Garmin Connect compatible",
					"Wahoo ELEMNT compatible",
					"Strava import support",
					"Privacy-first — files never leave your browser"
				]
			}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<script>
			// Honour prefers-color-scheme on first paint. No UI toggle in v1 —
			// the design bundle includes dark vars; we just opt in.
			try {
				if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
					document.documentElement.setAttribute('data-dark', '1');
				}
			} catch {
				/* no-op — older browsers fall back to light. */
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
